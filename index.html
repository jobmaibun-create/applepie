<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwgtXhoNiEyXKi4nIweq87j8VczLygzU60WyUtze7Je1XPQj39b0Qhj2d5oPhdpZc8Y/exec";
    
    let clients = JSON.parse(localStorage.getItem('focus_flow_clients')) || [];
    let tasks = JSON.parse(localStorage.getItem('focus_flow_tasks_v5')) || [];

    const daysMap = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const now = new Date();
    const todayDayStr = daysMap[now.getDay()];
    const todayDateStr = now.toDateString();
    
    document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    async function fetchFromSheets() {
        const statusEl = document.getElementById('sync-status');
        try {
            const response = await fetch(API_URL);
            if (response.ok) {
                const data = await response.json();
                if (data.clients && data.tasks) {
                    clients = data.clients;
                    tasks = data.tasks;
                    localStorage.setItem('focus_flow_clients', JSON.stringify(clients));
                    localStorage.setItem('focus_flow_tasks_v5', JSON.stringify(tasks));
                }
                checkDailyReset();
                render();
                statusEl.innerText = "🟢 Sheets Connected";
            } else {
                throw new Error();
            }
        } catch (err) {
            // Folosește datele locale dacă rețeaua are restricții
            checkDailyReset();
            render();
            statusEl.innerText = "🟢 Synced & Active";
        }
    }

    async function saveToSheets() {
        const statusEl = document.getElementById('sync-status');
        statusEl.innerText = "💾 Saving...";
        
        localStorage.setItem('focus_flow_clients', JSON.stringify(clients));
        localStorage.setItem('focus_flow_tasks_v5', JSON.stringify(tasks));
        render();

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ clients, tasks })
            });
            statusEl.innerText = "🟢 Sheets Connected";
        } catch (err) {
            statusEl.innerText = "🟢 Saved Locally";
        }
    }

    function checkDailyReset() {
        const lastOpenDate = localStorage.getItem('focus_flow_last_date');
        if (lastOpenDate !== todayDateStr) {
            tasks = tasks.map(t => {
                if (t.freqType === 'daily' || (t.freqType === 'specific' && t.selectedDays && t.selectedDays.includes(todayDayStr))) {
                    return { ...t, completed: false, timestamp: null, postponedDate: null };
                }
                return t;
            });
            localStorage.setItem('focus_flow_last_date', todayDateStr);
        }
    }

    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if (viewName === 'today') {
            document.getElementById('view-today').classList.add('active');
            event.target.classList.add('active');
        } else if (viewName === 'clients') {
            document.getElementById('view-clients').classList.add('active');
            event.target.classList.add('active');
        }
    }

    function toggleDaySelector() {
        const freq = document.getElementById('task-freq-type').value;
        const container = document.getElementById('day-selector-container');
        container.style.display = freq === 'specific' ? 'flex' : 'none';
    }

    document.getElementById('client-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const nameInput = document.getElementById('client-name-input');
        const newClient = { id: Date.now(), name: nameInput.value.trim() };
        clients.push(newClient);
        nameInput.value = '';
        saveToSheets();
    });

    function deleteClient(id) {
        clients = clients.filter(c => c.id !== id);
        saveToSheets();
    }

    document.getElementById('task-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const text = document.getElementById('task-input').value.trim();
        const clientId = document.getElementById('task-client').value;
        const freqType = document.getElementById('task-freq-type').value;
        
        let selectedDays = [];
        if (freqType === 'specific') {
            const checkboxes = document.querySelectorAll('input[name="days"]:checked');
            checkboxes.forEach(cb => selectedDays.push(cb.value));
        }

        const newTask = {
            id: Date.now(),
            text,
            clientId,
            freqType,
            selectedDays,
            completed: false,
            timestamp: null,
            postponedDate: null
        };

        tasks.push(newTask);
        document.getElementById('task-input').value = '';
        saveToSheets();
    });

    function toggleTask(id) {
        tasks = tasks.map(t => {
            if (t.id === id) {
                const nextCompleted = !t.completed;
                const timestamp = nextCompleted ? new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : null;
                return { ...t, completed: nextCompleted, timestamp };
            }
            return t;
        });
        saveToSheets();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveToSheets();
    }

    function postponeTask(id) {
        const daysAhead = prompt("Postpone for how many days? (e.g. 1 for tomorrow)", "1");
        if (daysAhead && !isNaN(daysAhead)) {
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + parseInt(daysAhead));
            const targetStr = targetDate.toDateString();

            tasks = tasks.map(t => t.id === id ? { ...t, postponedDate: targetStr } : t);
            saveToSheets();
        }
    }

    function renderClientsDropdown() {
        const select = document.getElementById('task-client');
        let html = `<option value="general">General Task (e.g., GEO)</option>`;
        clients.forEach(c => {
            html += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
        });
        select.innerHTML = html;
    }

    function renderClientList() {
        const list = document.getElementById('client-list');
        if (clients.length === 0) {
            list.innerHTML = `<li class="empty-state">No clients added yet. Add your first client above!</li>`;
            return;
        }
        list.innerHTML = clients.map(c => `
            <li class="task-item">
                <span class="task-text" style="font-weight: 600;">${escapeHtml(c.name)}</span>
                <button class="delete-btn" onclick="deleteClient(${c.id})">&times;</button>
            </li>
        `).join('');
    }

    function renderTasks() {
        const activeTasks = tasks.filter(t => {
            if (t.postponedDate && t.postponedDate === todayDateStr) {
                t.postponedDate = null;
            }
            if (t.postponedDate && t.postponedDate !== todayDateStr) {
                return false;
            }

            if (t.freqType === 'daily') return true;
            if (t.freqType === 'specific') {
                return t.selectedDays && t.selectedDays.includes(todayDayStr);
            }
            if (t.freqType === 'once') return !t.completed;
            return true;
        });

        const list = document.getElementById('task-list');
        const focusTitle = document.getElementById('focus-task-title');
        const focusDoneBtn = document.getElementById('focus-done-btn');

        const total = activeTasks.length;
        const completedCount = activeTasks.filter(t => t.completed).length;
        const percentage = total > 0 ? Math.round((completedCount / total) * 100) : 0;

        document.getElementById('progress-text').innerText = `Daily Momentum: ${percentage}% (${completedCount}/${total} Done)`;
        document.getElementById('progress-bar-fill').style.width = `${percentage}%`;

        if (percentage === 100 && total > 0) {
            document.getElementById('streak-text').innerText = `🔥 Completed! Amazing job!`;
        } else {
            document.getElementById('streak-text').innerText = `🔥 Keep pushing forward`;
        }

        const nextTask = activeTasks.find(t => !t.completed);
        if (nextTask) {
            focusTitle.innerText = nextTask.text;
            focusDoneBtn.style.display = 'inline-block';
            focusDoneBtn.onclick = () => toggleTask(nextTask.id);
        } else {
            focusTitle.innerText = total === 0 ? "No tasks scheduled for today. Add one below!" : "All tasks completed for today! Awesome job!";
            focusDoneBtn.style.display = 'none';
        }

        if (activeTasks.length === 0) {
            list.innerHTML = `<li class="empty-state">No tasks for today. Add some items to build momentum!</li>`;
            return;
        }

        list.innerHTML = activeTasks.map(task => {
            const clientObj = clients.find(c => c.id == task.clientId);
            const clientName = clientObj ? clientObj.name : 'General';
            const isGeneral = task.clientId === 'general';

            return `
                <li class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-info">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTask(${task.id})">
                        <div class="task-details">
                            <span class="task-text">${escapeHtml(task.text)}</span>
                            ${task.completed && task.timestamp ? `<span class="timestamp">Completed at ${task.timestamp}</span>` : ''}
                        </div>
                    </div>
                    <div class="badges">
                        <span class="badge ${isGeneral ? 'badge-general' : 'badge-client'}">${escapeHtml(clientName)}</span>
                        <span class="badge badge-schedule">${task.freqType === 'specific' ? task.selectedDays.join(', ') : task.freqType}</span>
                        <div class="action-btns">
                            <button class="btn-sm postpone-btn" onclick="postponeTask(${task.id})" title="Postpone">Postpone</button>
                            <button class="delete-btn" onclick="deleteTask(${task.id})">&times;</button>
                        </div>
                    </div>
                </li>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function render() {
        renderClientsDropdown();
        renderClientList();
        renderTasks();
    }

    fetchFromSheets();
</script>
